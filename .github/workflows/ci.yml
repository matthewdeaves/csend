name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CLOG_COMMIT: "9f512365ce09cf1eed592bd49b5d11307639456a"
  PEERTALK_COMMIT: "01864aa5cf59b7f0c0c3d1ceaba776aa1e328c1a"

jobs:
  build-posix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Clone and build clog
        run: |
          git clone https://github.com/matthewdeaves/clog.git "$HOME/clog"
          cd "$HOME/clog" && git checkout ${{ env.CLOG_COMMIT }}
          mkdir build && cd build
          cmake .. && make

      - name: Clone peertalk
        run: |
          git clone https://github.com/matthewdeaves/peertalk.git "$HOME/peertalk"
          cd "$HOME/peertalk" && git checkout ${{ env.PEERTALK_COMMIT }}

      - name: Build csend
        run: |
          mkdir build && cd build
          cmake .. -DCLOG_DIR="$HOME/clog" -DPEERTALK_DIR="$HOME/peertalk"
          make

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --error-exitcode=1 \
            --enable=warning,performance \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            -I posix \
            -I shared \
            posix/ shared/

  # Cross-compilation using Retro68 container (includes MPW Interfaces)
  build-68k-mactcp:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/matthewdeaves/retro68@sha256:39e46b947620f80659aaf87921043c824a1dc288ba5d39aa83e3a42814450352
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Clone and build clog for 68k
        run: |
          git clone https://github.com/matthewdeaves/clog.git /tmp/clog
          cd /tmp/clog && git checkout ${{ env.CLOG_COMMIT }}
          mkdir build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=/Retro68-build/toolchain/m68k-apple-macos/cmake/retro68.toolchain.cmake
          make

      - name: Clone peertalk
        run: |
          git clone https://github.com/matthewdeaves/peertalk.git /tmp/peertalk
          cd /tmp/peertalk && git checkout ${{ env.PEERTALK_COMMIT }}

      - name: Build csend for 68k (MacTCP)
        run: |
          mkdir build-68k && cd build-68k
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=/Retro68-build/toolchain/m68k-apple-macos/cmake/retro68.toolchain.cmake \
            -DCLOG_DIR=/tmp/clog \
            -DCLOG_LIB_DIR=/tmp/clog/build \
            -DPEERTALK_DIR=/tmp/peertalk \
            -DPT_PLATFORM=MACTCP
          make

  build-ppc-mactcp:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/matthewdeaves/retro68@sha256:39e46b947620f80659aaf87921043c824a1dc288ba5d39aa83e3a42814450352
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Clone and build clog for PPC
        run: |
          git clone https://github.com/matthewdeaves/clog.git /tmp/clog
          cd /tmp/clog && git checkout ${{ env.CLOG_COMMIT }}
          mkdir build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=/Retro68-build/toolchain/powerpc-apple-macos/cmake/retroppc.toolchain.cmake
          make

      - name: Clone peertalk
        run: |
          git clone https://github.com/matthewdeaves/peertalk.git /tmp/peertalk
          cd /tmp/peertalk && git checkout ${{ env.PEERTALK_COMMIT }}

      - name: Build csend for PPC (MacTCP)
        run: |
          mkdir build-ppc && cd build-ppc
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=/Retro68-build/toolchain/powerpc-apple-macos/cmake/retroppc.toolchain.cmake \
            -DCLOG_DIR=/tmp/clog \
            -DCLOG_LIB_DIR=/tmp/clog/build \
            -DPEERTALK_DIR=/tmp/peertalk \
            -DPT_PLATFORM=MACTCP
          make

  build-ppc-ot:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/matthewdeaves/retro68@sha256:39e46b947620f80659aaf87921043c824a1dc288ba5d39aa83e3a42814450352
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Clone and build clog for PPC
        run: |
          git clone https://github.com/matthewdeaves/clog.git /tmp/clog
          cd /tmp/clog && git checkout ${{ env.CLOG_COMMIT }}
          mkdir build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=/Retro68-build/toolchain/powerpc-apple-macos/cmake/retroppc.toolchain.cmake
          make

      - name: Clone peertalk
        run: |
          git clone https://github.com/matthewdeaves/peertalk.git /tmp/peertalk
          cd /tmp/peertalk && git checkout ${{ env.PEERTALK_COMMIT }}

      - name: Build csend for PPC (Open Transport)
        run: |
          mkdir build-ppc-ot && cd build-ppc-ot
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=/Retro68-build/toolchain/powerpc-apple-macos/cmake/retroppc.toolchain.cmake \
            -DCLOG_DIR=/tmp/clog \
            -DCLOG_LIB_DIR=/tmp/clog/build \
            -DPEERTALK_DIR=/tmp/peertalk \
            -DPT_PLATFORM=OT
          make
