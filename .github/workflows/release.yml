name: Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build csend
        run: cmake -B build && cmake --build build
      - name: Package
        run: tar czf csend-posix-linux-x64.tar.gz -C build csend-posix
      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: csend-posix-linux-x64.tar.gz
